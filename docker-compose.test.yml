services:
  backend-test:
    build: .
    command: pytest
    volumes:
      - .:/app
    environment:
      - POSTGRES_USER=test
      - POSTGRES_PASSWORD=test
      - POSTGRES_DB=test
      - DATABASE_HOST=localhost
      - PORT=5432
      - DATABASE_URL=postgresql://test:test@localhost:5432/test
      - DEBUG=False
